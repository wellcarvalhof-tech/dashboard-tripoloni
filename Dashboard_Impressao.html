<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F4F6FA;color:#1A1F2E;font-size:13px}

/* ── CONTROLES (ocultados na impressão) ── */
.screen-only{display:block}
.app-header{background:#16297A;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.app-title{font-size:15px;font-weight:600}
.app-sub{font-size:10px;opacity:.6;margin-top:2px}
.print-btn{background:#fff;color:#16297A;border:none;border-radius:5px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
.ctrl-bar{background:#fff;border-bottom:1px solid #DDE1E9;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cl{font-size:9px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.vsep{width:1px;height:20px;background:#DDE1E9;flex-shrink:0}
select,input[type=date]{font-size:11px;padding:5px 8px;border:1px solid #DDE1E9;border-radius:5px;background:#fff;color:#1A1F2E}
.mpill{padding:4px 10px;font-size:11px;border:1px solid #DDE1E9;border-radius:12px;cursor:pointer;background:#fff;color:#6B7280;white-space:nowrap;user-select:none;font-family:inherit}
.mpill.on{background:#16297A;color:#fff;border-color:#16297A}
.seg-toggle{display:flex;border:1px solid #DDE1E9;border-radius:6px;overflow:hidden}
.seg-btn{padding:5px 10px;font-size:11px;border:none;background:#fff;color:#6B7280;cursor:pointer;font-family:inherit}
.seg-btn+.seg-btn{border-left:1px solid #DDE1E9}
.seg-btn.on{background:#16297A;color:#fff}
.chk{display:flex;align-items:center;gap:5px;font-size:11px;color:#374151;cursor:pointer;white-space:nowrap}
.chk input{accent-color:#16297A;width:13px;height:13px}
.gen-btn{background:#16297A;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;margin-left:auto}
.body{padding:16px 20px}

/* Seletor multiplo de escavadeiras */
.msel{position:relative;display:inline-block}
.msel-btn{font-size:11px;padding:5px 10px;border:1px solid #DDE1E9;border-radius:5px;background:#fff;color:#1A1F2E;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:inherit}
.msel-btn:after{content:'▾';font-size:9px;color:#6B7280}
.msel-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:50;background:#fff;border:1px solid #DDE1E9;border-radius:6px;box-shadow:0 4px 14px rgba(0,0,0,.12);padding:6px;min-width:170px;max-height:240px;overflow-y:auto}
.msel-panel.open{display:block}
.msel-opt{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:11px;white-space:nowrap;color:#374151}
.msel-opt:hover{background:#F1F3F5}
.msel-opt input{cursor:pointer;accent-color:#16297A}

/* ── RELATÓRIO ── */
#report{background:#fff;border:1px solid #DDE1E9;border-radius:8px;overflow:hidden;max-width:1200px;margin:0 auto}

/* Cabeçalho azul — forçar cor na impressão */
.rep-header{
  background:#16297A !important;
  -webkit-print-color-adjust:exact !important;
  print-color-adjust:exact !important;
  color-adjust:exact !important;
  padding:16px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:16px
}
.rep-center{text-align:center;flex:1}
.rep-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:.01em}
.rep-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:4px}
.rep-meta{font-size:10px;color:rgba(255,255,255,.5);line-height:1.8;min-width:130px}
.rep-logo{height:44px;object-fit:contain;object-position:left}

/* KPIs */
.krow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px 18px}
.kc{
  background:#F0F4FF !important;
  -webkit-print-color-adjust:exact !important;
  print-color-adjust:exact !important;
  border:1px solid #D0D9F0;border-radius:7px;padding:10px 12px
}
.kl{font-size:8px;color:#6B7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:600}
.kv{font-size:22px;font-weight:700;color:#16297A}
.ks{font-size:9px;color:#9CA3AF;margin-top:3px}

/* Área de gráficos — dominante na página */
.charts-area{padding:0 18px 12px}
.charts-grid{display:grid;gap:12px;grid-template-columns:1fr 1fr}
.chart-box{border:1px solid #E5E8EF;border-radius:7px;padding:12px 14px}
.chart-box.full{grid-column:1/-1}
.ctitle{font-size:11px;font-weight:700;color:#16297A;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ctitle::before{content:'';width:7px;height:7px;border-radius:50%;background:#16297A;flex-shrink:0}
.chart-canvas-wrap{position:relative;height:260px}
.chart-canvas-wrap.tall{height:320px}
.chart-canvas-wrap canvas{width:100%!important;height:100%!important}

/* Tabela */
.tbl-wrap{padding:0 18px 16px}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
th{font-size:9px;color:#6B7280;text-transform:uppercase;letter-spacing:.04em;padding:6px 7px;border-bottom:2px solid #E5E8EF;font-weight:600;text-align:left;white-space:nowrap}
th.r,td.r{text-align:right}
td{padding:5px 7px;border-bottom:1px solid #F0F2F7;color:#111827;white-space:nowrap}
tr:hover td{background:#F8F9FF}
tr.tot td{font-weight:700;background:#F0F4FF;border-top:2px solid #D0D9F0}
.et{font-family:monospace;font-size:10px;background:#EEF2FF;color:#3730A3;padding:2px 5px;border-radius:3px}
.bp{font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap}
.gp{background:#D1FAE5;color:#065F46}
.wp{background:#FEF3C7;color:#92400E}
.rp{background:#FEE2E2;color:#991B1B}
.bn{background:#F3F4F6;color:#6B7280}
.empty{text-align:center;padding:60px;color:#9CA3AF;font-size:14px}

/* ── IMPRESSÃO ── */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  body{background:#fff!important;font-size:10px!important}
  .screen-only{display:none!important}
  .body{padding:0!important}

var ML_NOMES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var ML = (function(){
  var o={};
  for(var a=2026;a<=2030;a++){
    for(var m=1;m<=12;m++){
      var k=a+'-'+(m<10?'0':'')+m;
      o[k]=ML_NOMES[m-1];
    }
  }
  return o;
})();
var MESES_ALL = (function(){
  var set={};
  Object.values(D.daily_obra_eq).forEach(function(eqs){
    Object.values(eqs).forEach(function(days){
      Object.keys(days).forEach(function(d){set[d.slice(0,7)]=1;});
    });
  });
  return Object.keys(set).sort();
})();
var SEMANAS_ALL = (function(){
  var set={};
  Object.values(D.daily_obra_eq).forEach(function(eqs){
    Object.values(eqs).forEach(function(days){
      Object.keys(days).forEach(function(d){
        var dt=new Date(d+'T00:00:00');
        var wd=dt.getDay(); // 0=dom..6=sab
        var mon=new Date(dt); mon.setDate(dt.getDate()+(wd===0?-6:1-wd));
        set[mon.toISOString().slice(0,10)]=1;
      });
    });
  });
  return Object.keys(set).sort();
})();
function semanaLabel(monStr){
  var mon=new Date(monStr+'T00:00:00');
  var sun=new Date(mon); sun.setDate(mon.getDate()+6);
  var fmt=function(dt){return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');};
  return fmt(mon)+' a '+fmt(sun);
}
function weekMonday(d){
  var dt=new Date(d+'T00:00:00');
  var wd=dt.getDay(); // 0=dom..6=sab
  var mon=new Date(dt); mon.setDate(dt.getDate()+(wd===0?-6:1-wd));
  return mon.toISOString().slice(0,10);
}
function aggregateByWeek(dates, dailyMap){
  var buckets={};
  dates.forEach(function(d){
    var key=weekMonday(d);
    if(!buckets[key]) buckets[key]={prod:0,hrs:0,oc:0};
    var v=dailyMap[d];
    buckets[key].prod+=v.prod; buckets[key].hrs+=v.hrs; buckets[key].oc+=v.oc;
  });
  var keys=Object.keys(buckets).sort();
  return {
    labels:keys.map(function(k){return semanaLabel(k);}),
    prod:keys.map(function(k){return Math.round(buckets[k].prod);}),
    hrs:keys.map(function(k){return buckets[k].hrs;}),
    oc:keys.map(function(k){return buckets[k].oc;})
  };
}

function fd(n,d){if(n==null||isNaN(n))return '--';return n.toFixed(d!=null?d:1);}

function inRange(d){
  if(dtStart&&dtEnd) return d>=dtStart&&d<=dtEnd;
  if(modoTempo==='semana') return selSemanas.indexOf(weekMonday(d))!==-1;
  return selMeses.indexOf(d.slice(0,7))!==-1;
}

// INIT
var _initializing = true;
(function init(){
  var sel=document.getElementById('sel-obra');
  sel.innerHTML='<option value="ALL">Todas as obras</option>';
  D.obras.forEach(function(o){
    var opt=document.createElement('option');
    opt.value=o; opt.textContent=D.OS[o]||o; sel.appendChild(opt);
  });
  // Default: Lucas (sem disparar onchange)
  var lucasIdx=D.obras.indexOf('OBRA 421 - LUCAS');
  if(lucasIdx>=0){
    sel.selectedIndex=lucasIdx+1;
    selMeses=MESES_ALL.slice(-2); // mantém 2 meses mais recentes como padrão
  }

  var pm=document.getElementById('pill-meses');
  MESES_ALL.forEach(function(m){
    var b=document.createElement('button');
    b.className='mpill'+(selMeses.indexOf(m)!==-1?' on':'');
    b.textContent=ML[m]; b.dataset.m=m;
    b.onclick=function(){toggleMes(m,this);};
    pm.appendChild(b);
  });
  _initializing = false;
  renderReport();
})();

function toggleMes(m,btn){
  var i=selMeses.indexOf(m);
  if(i===-1){selMeses.push(m);btn.classList.add('on');}
  else{selMeses.splice(i,1);btn.classList.remove('on');}
  if(!selMeses.length){selMeses=MESES_ALL.slice();document.querySelectorAll('.mpill').forEach(function(b){b.classList.add('on');});}
  dtStart='';dtEnd='';
  document.getElementById('dt-start').value='';
  document.getElementById('dt-end').value='';
  selEqs=null;
  renderReport();
}

function setModoTempo(m){
  modoTempo=m;
  document.getElementById('btn-modo-mes').classList.toggle('on', m==='mes');
  document.getElementById('btn-modo-semana').classList.toggle('on', m==='semana');
  document.getElementById('pill-meses').style.display = m==='mes' ? 'flex' : 'none';
  var pillSemanas=document.getElementById('pill-semanas');
  pillSemanas.style.display = m==='semana' ? 'flex' : 'none';
  if(m==='semana' && !pillSemanas.dataset.built){
    var html='';
    SEMANAS_ALL.forEach(function(monStr){
      html+='<button type="button" class="mpill'+(selSemanas.indexOf(monStr)!==-1?' on':'')+'" data-mon="'+monStr+'" onclick="toggleSemana(\''+monStr+'\',this)">'+semanaLabel(monStr).split(' a ')[0]+'</button>';
    });
    pillSemanas.innerHTML=html;
    pillSemanas.dataset.built='1';
  }
  dtStart='';dtEnd='';
  document.getElementById('dt-start').value='';
  document.getElementById('dt-end').value='';
  selEqs=null;
  renderReport();
}

function toggleSemana(monStr,btn){
  var i=selSemanas.indexOf(monStr);
  if(i===-1){selSemanas.push(monStr);btn.classList.add('on');}
  else{selSemanas.splice(i,1);btn.classList.remove('on');}
  if(!selSemanas.length){
    selSemanas=SEMANAS_ALL.slice(-4);
    document.querySelectorAll('#pill-semanas .mpill').forEach(function(b){
      b.classList.toggle('on', selSemanas.indexOf(b.dataset.mon)!==-1);
    });
  }
  selEqs=null;
  renderReport();
}

function onObraChange(){if(_initializing)return;selEqs=null;renderReport();}

function onDateChange(){
  dtStart=document.getElementById('dt-start').value;
  dtEnd=document.getElementById('dt-end').value;
  if(dtStart&&dtEnd){
    selMeses=[];
    document.querySelectorAll('.mpill').forEach(function(b){
      var m=b.dataset.m;
      if(m>=dtStart.slice(0,7)&&m<=dtEnd.slice(0,7)){
        if(selMeses.indexOf(m)===-1) selMeses.push(m);
        b.classList.add('on');
      } else b.classList.remove('on');
    });
  }
  selEqs=null;
  renderReport();
}

function mselLabel(sel, eqs){
  if(sel===null||sel.length===eqs.length) return 'Todas';
  if(!sel.length) return 'Nenhuma';
  if(sel.length===1) return sel[0];
  return sel.length+' escavadeiras';
}

function buildEqMsel(eqs){
  var panel=document.getElementById('msel-eqs-panel');
  var btn=document.getElementById('msel-eqs-btn');
  if(!panel||!btn) return;
  btn.textContent=mselLabel(selEqs,eqs);
  var html='<label class="msel-opt"><input type="checkbox" '+(selEqs===null?'checked':'')+' onchange="mselEqPickAll(this.checked)"> Todas as escavadeiras</label>';
  eqs.forEach(function(es){
    var checked=selEqs===null||selEqs.indexOf(es)!==-1;
    html+='<label class="msel-opt"><input type="checkbox" '+(checked?'checked':'')+' onchange="mselEqPick(\''+es+'\',this.checked)"> '+es+'</label>';
  });
  panel.innerHTML=html;
  panel.dataset.eqs=JSON.stringify(eqs);
}

function mselEqPickAll(checked){
  var panel=document.getElementById('msel-eqs-panel');
  var eqs=JSON.parse(panel.dataset.eqs||'[]');
  selEqs=checked?null:[];
  buildEqMsel(eqs);
  renderReport();
}

function mselEqPick(es,checked){
  var panel=document.getElementById('msel-eqs-panel');
  var eqs=JSON.parse(panel.dataset.eqs||'[]');
  var sel=selEqs===null?eqs.slice():selEqs.slice();
  if(checked){ if(sel.indexOf(es)===-1) sel.push(es); }
  else{ sel=sel.filter(function(x){return x!==es;}); }
  selEqs=(sel.length===eqs.length)?null:sel;
  buildEqMsel(eqs);
  renderReport();
}

function mselToggle(baseId){
  var panel=document.getElementById(baseId+'-panel');
  var isOpen=panel.classList.contains('open');
  document.querySelectorAll('.msel-panel.open').forEach(function(p){p.classList.remove('open');});
  if(!isOpen) panel.classList.add('open');
}

document.addEventListener('click', function(e){
  if(!e.target.closest('.msel')){
    document.querySelectorAll('.msel-panel.open').forEach(function(p){p.classList.remove('open');});
  }
});

// ── COMPUTE ──────────────────────────────────────────────────────────────────
function compute(){
  var selObra=document.getElementById('sel-obra').value;
  var obras=selObra==='ALL'?D.obras:[selObra];
  var fHrs=document.getElementById('chk-fhrs')&&document.getElementById('chk-fhrs').checked;
  var fProd=document.getElementById('chk-fprod')&&document.getElementById('chk-fprod').checked;
  var modAtivos=[];
  ['320','336','349'].forEach(function(m){
    var el=document.getElementById('chk-m'+m);
    if(!el||el.checked) modAtivos.push(m);
  });

  var dailyMap={}, eqProd={}, eqHrs={}, eqOc={}, eqDiaMap={};

  obras.forEach(function(obra){
    var oEqs=D.daily_obra_eq[obra]||{};
    Object.keys(oEqs).forEach(function(es){
      if(selEqs&&selEqs.indexOf(es)===-1) return;
      // Filtro de modelo
      var mo=(D.es_modelo&&D.es_modelo[es])||'--';
      if(modAtivos.length<3&&modAtivos.indexOf(mo)===-1) return;
      var days=oEqs[es];
      if(!eqProd[es]){eqProd[es]=0;eqHrs[es]=0;eqOc[es]=0;}
      Object.keys(days).forEach(function(d){
        if(!inRange(d)) return;
        var v=days[d];
        var p=v.prod||0,h=v.hrs||0,oc=v.oc||0;
        // Flags de exclusão (nível de dia)
        if(fHrs&&h===0&&p===0) return;
        if(fProd&&p===0) return;
        eqProd[es]+=p; eqHrs[es]+=h; eqOc[es]+=oc;
        if(p>0){if(!eqDiaMap[d])eqDiaMap[d]={};eqDiaMap[d][es]=1;} // conta equip com prod>0 por dia
        if(!dailyMap[d]) dailyMap[d]={prod:0,hrs:0,oc:0};
        dailyMap[d].prod+=p; dailyMap[d].hrs+=h; dailyMap[d].oc+=oc;
      });
    });
  });

  var dates=Object.keys(dailyMap).sort();
  var totProd=0,totHrs=0,totOc=0,totMeta=0,metaOk=false;

  // Todos os equipamentos para o filtro de pills (sem filtro de selEqs)
  var allEqsSet={};
  obras.forEach(function(obra){
    Object.keys(D.daily_obra_eq[obra]||{}).forEach(function(es){
      var eqDays=D.daily_obra_eq[obra][es]||{};
      var hasData=Object.keys(eqDays).some(function(d){return inRange(d)&&((eqDays[d].prod||0)>0||(eqDays[d].hrs||0)>0);});
      if(hasData) allEqsSet[es]=1;
    });
  });
  var allEqs=Object.keys(allEqsSet).sort();

  var eqRows=Object.keys(eqProd).filter(function(es){
    return eqProd[es]>0||eqHrs[es]>0;
  }).map(function(es){
    var mo=(D.es_modelo&&D.es_modelo[es])||'--';
    var mTH=D.meta_th[mo]||null;
    var hBase=eqHrs[es]+eqOc[es];
    var meta=mTH?mTH*hBase:null;
    totProd+=eqProd[es]; totHrs+=eqHrs[es]; totOc+=eqOc[es];
    if(meta){totMeta+=meta;metaOk=true;}
    var ating=meta&&meta>0?eqProd[es]/meta*100:null;
    return {es:es,modelo:mo,prod:eqProd[es],hrs:eqHrs[es],oc:eqOc[es],
            util:hBase>0?eqHrs[es]/hBase*100:0,meta:meta,ating:ating};
  }).sort(function(a,b){return b.prod-a.prod;});

  var hBase=totHrs+totOc;
  var totAting=metaOk&&totMeta>0?totProd/totMeta*100:null;
  // t/equip-dia recalculado com filtros (replica logica Python: prod / soma de equip com prod>0 por dia)
  var totEqDias=0;
  Object.keys(eqDiaMap).forEach(function(d){totEqDias+=Object.keys(eqDiaMap[d]).length;});
  var tEquipDia=totEqDias>0?Math.round(totProd/totEqDias*10)/10:0;

  return {dates:dates,dailyMap:dailyMap,eqRows:eqRows,allEqs:allEqs,
          totProd:totProd,totHrs:totHrs,totOc:totOc,
          totMeta:metaOk?totMeta:null,totAting:totAting,
          totUtil:hBase>0?totHrs/hBase*100:0,
          nEq:eqRows.length,tEquipDia:tEquipDia};
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderReport(){
  Object.keys(CHARTS).forEach(function(k){if(CHARTS[k]){CHARTS[k].destroy();CHARTS[k]=null;}});
  CHARTS={};

  var calc=compute();
  var selObra=document.getElementById('sel-obra').value;
  var obraLabel=selObra==='ALL'?'Todas as obras':(D.OS[selObra]||selObra);
  var showProd=document.getElementById('chk-prod').checked;
  var showHrs=document.getElementById('chk-hrs').checked;
  var showEq=document.getElementById('chk-eq').checked;
  var showAcum=document.getElementById('chk-acum').checked;

  var periodoLabel='';
  if(dtStart&&dtEnd){
    periodoLabel=dtStart.split('-').reverse().join('/')+' a '+dtEnd.split('-').reverse().join('/');
  } else if(modoTempo==='semana'){
    var sortedSem=selSemanas.slice().sort();
    periodoLabel=sortedSem.length
      ? sortedSem.map(function(m){return semanaLabel(m);}).join(', ')+' ('+sortedSem.length+' semana'+(sortedSem.length>1?'s':'')+')'
      : 'Nenhuma semana selecionada';
  } else {
    periodoLabel=selMeses.map(function(m){return ML[m];}).join(', ')+' 2026';
  }

  var today=new Date();
  var dd=String(today.getDate()).padStart(2,'0');
  var mm=String(today.getMonth()+1).padStart(2,'0');
  var yyyy=today.getFullYear();
  var todayFmt=dd+'/'+mm+'/'+yyyy;

  var html='';
  // Cabeçalho
  html+='<div class="rep-header">';
  html+='<div class="rep-meta">Gerado em '+todayFmt+'<br>VisionLink Caterpillar</div>';
  html+='<div class="rep-center">';
  html+='<div class="rep-title">Relatório de Produção \u2014 '+obraLabel+'</div>';
  html+='<div class="rep-sub">'+periodoLabel+' \u00b7 Tripoloni Construtora</div>';
  html+='</div>';
  html+='<img class="rep-logo" src="data:image/png;base64,'+LOGO_B64+'" alt="Tripoloni Construtora">';
  html+='</div>';

  // KPIs
  html+='<div class="krow">';
  html+='<div class="kc"><div class="kl">Produção acumulada</div><div class="kv">'+f(calc.totProd)+'t</div><div class="ks">'+periodoLabel+'</div></div>';
  html+='<div class="kc"><div class="kl">Equipamentos ativos</div><div class="kv">'+calc.nEq+'</div><div class="ks">No período</div></div>';
  html+='<div class="kc"><div class="kl">Dias com apontamento</div><div class="kv">'+calc.dates.length+'</div><div class="ks">'+periodoLabel+'</div></div>';
  html+='<div class="kc"><div class="kl">t / equip-dia</div><div class="kv">'+f(calc.tEquipDia)+'</div><div class="ks">Ponderado</div></div>';
  html+='<div class="kc"><div class="kl">Utilização média</div><div class="kv">'+fd(calc.totUtil)+'%</div><div class="ks">Trab / disponível</div></div>';
  html+='</div>';

  // Atualiza o dropdown de escavadeiras no painel de filtros do topo
  buildEqMsel(calc.allEqs);

  // Gráficos
  var nCharts=[showProd,showHrs,showEq,showAcum].filter(Boolean).length;
  if(nCharts>0){
    var gridStyle=nCharts===1?'grid-template-columns:1fr':nCharts===2?'grid-template-columns:1fr 1fr':'grid-template-columns:1fr 1fr';
    html+='<div class="charts-area"><div class="charts-grid" style="'+gridStyle+'">';
    var prodTitle=modoTempo==='semana'?'Produção semanal (t)':'Produção diária (t)';
    var hrsTitle=modoTempo==='semana'?'Horas trabalhadas vs ociosas (%) — semanal':'Horas trabalhadas vs ociosas (%)';
    if(showProd) html+='<div class="chart-box'+(nCharts===1?' full':'')+'"><div class="ctitle">'+prodTitle+'</div><div class="chart-canvas-wrap'+(nCharts<=2?' tall':'')+'"><canvas id="ch-prod"></canvas></div></div>';
    if(showHrs)  html+='<div class="chart-box'+(nCharts===1?' full':'')+'"><div class="ctitle">'+hrsTitle+'</div><div class="chart-canvas-wrap'+(nCharts<=2?' tall':'')+'"><canvas id="ch-hrs"></canvas></div></div>';
    if(showEq)   html+='<div class="chart-box'+(nCharts===1?' full':'')+'"><div class="ctitle">Produção por equipamento (t)</div><div class="chart-canvas-wrap'+(nCharts<=2?' tall':'')+'"><canvas id="ch-eq"></canvas></div></div>';
    if(showAcum) html+='<div class="chart-box'+(nCharts===1?' full':'')+'"><div class="ctitle">Avanço acumulado (t)</div><div class="chart-canvas-wrap'+(nCharts<=2?' tall':'')+'"><canvas id="ch-acum"></canvas></div></div>';
    html+='</div></div>';
  }

  // Tabela
  html+='<div class="tbl-wrap"><table>';
  html+='<thead><tr>';
  html+='<th style="width:11%">Equipamento</th><th style="width:7%">Modelo</th>';
  html+='<th class="r" style="width:13%">Produção (t)</th>';
  html+='<th class="r" style="width:10%">Hrs trab.</th>';
  html+='<th class="r" style="width:10%">Hrs ociosas</th>';
  html+='<th class="r" style="width:9%">Utilização</th>';
  html+='<th class="r" style="width:11%">Meta (t)</th>';
  html+='<th class="r" style="width:10%">Atingimento</th>';
  html+='<th style="width:11%">Status</th>';
  html+='</tr></thead><tbody>';

  calc.eqRows.forEach(function(r){
    var stCls=r.ating==null?'bn':(r.ating>=150?'rp':r.ating>=100?'gp':'wp');
    var stTxt=r.ating==null?'—':(r.ating>=150?'⚠ Revisar':r.ating>=100?'Meta atingida':'Abaixo da meta');
    var alertaHrs=(r.prod>0&&r.hrs===0)?'<sup style="color:#B7770D" title="Horas não registradas">⚠</sup>':'';
    html+='<tr>';
    html+='<td><span class="et">'+r.es+'</span></td>';
    html+='<td>'+r.modelo+'</td>';

    html+='<td class="r">'+fd(r.hrs)+' h'+alertaHrs+'</td>';
    html+='<td class="r">'+fd(r.oc)+' h</td>';
    html+='<td class="r">'+fd(r.util)+'%</td>';
    html+='<td class="r">'+(r.meta!=null?f(r.meta):'—')+'</td>';
    html+='<td class="r" style="font-weight:700;color:'+(r.ating==null?'inherit':r.ating>=100?'#065F46':'#92400E')+'">'+(r.ating!=null?fd(r.ating)+'%':'—')+'</td>';
    html+='<td><span class="bp '+stCls+'">'+stTxt+'</span></td>';
    html+='</tr>';
  });

  html+='<tr class="tot">';
  html+='<td colspan="2">Total</td>';
  html+='<td class="r">'+f(calc.totProd)+'</td>';
  html+='<td class="r">'+fd(calc.totHrs)+' h</td>';
  html+='<td class="r">'+fd(calc.totOc)+' h</td>';
  html+='<td class="r">'+fd(calc.totUtil)+'%</td>';
  html+='<td class="r">'+(calc.totMeta!=null?f(calc.totMeta):'—')+'</td>';
  html+='<td class="r" style="font-weight:700">'+(calc.totAting!=null?fd(calc.totAting)+'%':'—')+'</td>';
  html+='<td>—</td>';
  html+='</tr>';
  html+='</tbody></table></div>';

  document.getElementById('report').innerHTML=html;

  buildCharts(calc,showProd,showHrs,showEq,showAcum,nCharts);
}

function buildCharts(calc,showProd,showHrs,showEq,showAcum,nCharts){
  if(!CHARTS_OK) return; // sem Chart.js: tabelas e KPIs continuam funcionando
  var dates=calc.dates;
  var dailyMap=calc.dailyMap;
  var labels=dates.map(function(d){return d.slice(5).split('-').reverse().join('/');});
  var fmtK=function(v){return v>=1000?(v/1000).toFixed(0)+'k':v;};
  var isTall=nCharts<=2;
  var COLS=['#16297A','#0E6655','#B7770D','#D35400','#993556','#534AB7','#2980B9','#8E44AD','#1A7A4A','#C0392B'];
  var wk=modoTempo==='semana'?aggregateByWeek(dates,dailyMap):null;
  var chartLabels=wk?wk.labels:labels;

  if(showProd&&document.getElementById('ch-prod')){
    var prodData=wk?wk.prod.slice():dates.map(function(d){return Math.round(dailyMap[d].prod);});
    var maxP=Math.max.apply(null,prodData.concat([1]));
    CHARTS['prod']=new Chart(document.getElementById('ch-prod'),{
      type:'bar',
      data:{labels:chartLabels,datasets:[{
        data:prodData,
        backgroundColor:'#16297Acc',
        borderWidth:0
      }]},
      options:{
        responsive:true,maintainAspectRatio:false,
        layout:{padding:{top:22}},
        plugins:{
          legend:{display:false},
          datalabels:{
            anchor:'end',align:'end',
            formatter:function(v){return v>=1000?(v/1000).toFixed(1)+'k':v;},
            font:{size:8,weight:'bold'},
            color:'#16297A',
            display:function(ctx){
              var v=ctx.dataset.data[ctx.dataIndex];
              return v!=null&&v>=maxP*0.05;
            }
          }
        },
        scales:{
          x:{ticks:{font:{size:7},maxRotation:45,autoSkip:true,maxTicksLimit:isTall?30:20}},
          y:{ticks:{font:{size:8},callback:fmtK},grid:{color:'#F0F2F7'}}
        }
      },
      plugins:[ChartDataLabels]
    });
  }

  if(showHrs&&document.getElementById('ch-hrs')){
    var hrsD,ocD;
    if(wk){
      hrsD=wk.hrs.map(function(h,i){var t=h+wk.oc[i];return t>0?+(h/t*100).toFixed(1):0;});
      ocD=wk.oc.map(function(o,i){var t=wk.hrs[i]+o;return t>0?+(o/t*100).toFixed(1):0;});
    } else {
      hrsD=dates.map(function(d){var v=dailyMap[d],t=v.hrs+v.oc;return t>0?+(v.hrs/t*100).toFixed(1):0;});
      ocD=dates.map(function(d){var v=dailyMap[d],t=v.hrs+v.oc;return t>0?+(v.oc/t*100).toFixed(1):0;});
    }
    CHARTS['hrs']=new Chart(document.getElementById('ch-hrs'),{
      type:'bar',
      data:{labels:chartLabels,datasets:[
        {label:'Trabalhadas %',data:hrsD,backgroundColor:'#1D9E75cc',stack:'s'},
        {label:'Ociosas %',data:ocD,backgroundColor:'#EF9F27cc',stack:'s'}
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'top',labels:{font:{size:9},boxWidth:10}},
          datalabels:{
            formatter:function(v){return v>=10?v.toFixed(0)+'%':'';},
            font:{size:8,weight:'bold'},
            color:'#fff',
            anchor:'center',align:'center',
            display:function(ctx){
              var v=ctx.dataset.data[ctx.dataIndex];
              return v!=null&&v>=12;
            }
          }
        },
        scales:{
          x:{stacked:true,ticks:{font:{size:7},maxRotation:45,autoSkip:true,maxTicksLimit:isTall?30:20}},
          y:{stacked:true,max:100,ticks:{font:{size:8},callback:function(v){return v+'%';}},grid:{color:'#F0F2F7'}}
        }
      },
      plugins:[ChartDataLabels]
    });
  }

  if(showEq&&document.getElementById('ch-eq')){
    var selObra2=document.getElementById('sel-obra').value;
    var obras2=selObra2==='ALL'?D.obras:[selObra2];
    var eqByDate={};
    var topEqs=calc.eqRows.slice(0,10).map(function(r){return r.es;});
    topEqs.forEach(function(es){eqByDate[es]={};});
    obras2.forEach(function(obra){
      var oEqs=D.daily_obra_eq[obra]||{};
      topEqs.forEach(function(es){
        if(!oEqs[es]) return;
        dates.forEach(function(d){
          if(oEqs[es][d]) eqByDate[es][d]=(eqByDate[es][d]||0)+(oEqs[es][d].prod||0);
        });
      });
    });
    var datasets=topEqs.map(function(es,i){
      return {label:es,data:dates.map(function(d){return Math.round(eqByDate[es][d]||0);}),
        borderColor:COLS[i%COLS.length],backgroundColor:COLS[i%COLS.length]+'22',
        borderWidth:2,pointRadius:dates.length>30?0:2,tension:0.3,fill:false};
    });
    CHARTS['eq']=new Chart(document.getElementById('ch-eq'),{
      type:'line',
      data:{labels:labels,datasets:datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'right',labels:{font:{size:9},boxWidth:10}},
          datalabels:{display:false}
        },
        scales:{
          x:{ticks:{font:{size:7},maxRotation:45,autoSkip:true,maxTicksLimit:isTall?30:20}},
          y:{ticks:{font:{size:8},callback:fmtK},grid:{color:'#F0F2F7'}}
        }
      }
    });
  }

  if(showAcum&&document.getElementById('ch-acum')){
    var ac=0;
    var acumArr=dates.map(function(d){ac+=dailyMap[d].prod;return Math.round(ac);});
    CHARTS['acum']=new Chart(document.getElementById('ch-acum'),{
      type:'line',
      data:{labels:labels,datasets:[{
        label:'Acumulado',data:acumArr,
        borderColor:'#16297A',backgroundColor:'#16297A18',
        borderWidth:2.5,pointRadius:0,tension:0.4,fill:true
      }]},
      options:{
        responsive:true,maintainAspectRatio:false,
        layout:{padding:{right:50}},
        plugins:{
          legend:{display:false},
          datalabels:{
            display:function(ctx){return ctx.dataIndex===dates.length-1;},
            formatter:function(v){return v>=1000?(v/1000).toFixed(0)+'kt':v+'t';},
            font:{size:10,weight:'bold'},color:'#16297A',
            anchor:'end',align:'left',offset:4
          }
        },
        scales:{
          x:{ticks:{font:{size:7},maxRotation:45,autoSkip:true,maxTicksLimit:isTall?30:20}},
          y:{ticks:{font:{size:8},callback:fmtK},grid:{color:'#F0F2F7'}}
        }
      },
      plugins:[ChartDataLabels]
    });
  }
}
