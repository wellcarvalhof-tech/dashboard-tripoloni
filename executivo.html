<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Producao Escavadeiras — Tripoloni</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#16297A;--teal:#0E6655;--amber:#B7770D;--bg:#EEF0F3;--white:#fff;--border:#D5D8DC;--text:#2C3E50;--muted:#7F8C8D;--ok:#1E8449;--warn:#B7950B;--danger:#C0392B;--strip:#0F1F5C}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom)}

.topbar{background:var(--blue);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:-webkit-sticky;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3);padding-top:max(10px,env(safe-area-inset-top))}
.topbar h1{font-size:16px;font-weight:700}
.topbar .sub{font-size:11px;opacity:.6;margin-top:1px}
.date-badge{background:rgba(255,255,255,.15);color:#AED6F1;font-size:12px;padding:5px 11px;border-radius:4px}

.obra-strip{background:var(--strip);padding:8px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;position:-webkit-sticky;position:sticky;top:46px;z-index:199;box-shadow:0 2px 5px rgba(0,0,0,.2);-webkit-overflow-scrolling:touch}
.obra-strip::-webkit-scrollbar{display:none}
.ocard{flex-shrink:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:6px 12px;cursor:pointer;text-align:center;min-width:82px;-webkit-tap-highlight-color:rgba(255,255,255,.2);touch-action:manipulation}
.ocard.active{background:#fff;border-color:#fff}
.ocard .on{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.04em;line-height:1.3}
.ocard .ov{font-size:14px;font-weight:700;color:#fff;line-height:1.4}
.ocard.active .on,.ocard.active .ov{color:var(--blue)}

.main{padding:14px 16px 20px}

/* KPI CARDS */
.kpi3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.kpi{background:var(--white);border-radius:8px;border:1px solid var(--border);padding:8px 6px;text-align:center}
.kpi-left{margin-bottom:0}
.kl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kv{font-size:17px;font-weight:700;color:var(--blue);line-height:1.1;display:block}
.ks{font-size:8px;color:var(--muted);margin-top:1px;display:block}
.kpi-div{display:block;width:100%;height:1px;background:var(--border);margin:6px 0 4px}
.kpi-right{display:block}
.kped-val{font-size:14px;font-weight:700;color:var(--teal);display:block}
.kped-lbl{font-size:8px;color:var(--muted);display:block}

/* CARD */
.card{background:var(--white);border-radius:8px;border:1px solid var(--border);padding:14px;margin-bottom:14px}
.ct{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* TABLES */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;white-space:nowrap;font-size:13px}
th{padding:8px 10px;font-size:11px;font-weight:600;color:var(--muted);border-bottom:2px solid #EBF5FB;background:#FAFBFC;text-align:left;text-transform:uppercase;letter-spacing:.03em}
th.r,td.r{text-align:right}
td{padding:7px 10px;border-bottom:1px solid #F4F6F7;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}
.total-row td{font-weight:700;background:#EBF5FB;color:var(--blue)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700}
.b-ok{background:#EAFAF1;color:var(--ok)}
.b-warn{background:#FEF9E7;color:var(--warn)}
.b-danger{background:#FDEDEC;color:var(--danger)}
.es-tag{display:inline-block;background:#EBF5FB;color:var(--blue);font-size:11px;font-weight:700;padding:2px 6px;border-radius:3px}
.ph-val{color:var(--teal);font-weight:700}
.obra-nm{font-weight:700}

/* SELETOR PERIODO */
.ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;padding:8px 12px;background:#F8F9FA;border-radius:6px;border:1px solid var(--border)}
.ctrl label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.seg{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.seg button{padding:5px 10px;font-size:12px;border:none;background:var(--white);color:var(--muted);cursor:pointer;font-weight:500;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.seg button.active{background:var(--blue);color:#fff}
.date-fields{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.date-fields label{font-size:11px;color:var(--muted)}
.date-fields input[type=date]{font-size:14px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;background:var(--white);color:var(--text)}
.apply-btn{font-size:12px;padding:5px 12px;background:var(--blue);color:#fff;border:none;border-radius:5px;cursor:pointer;touch-action:manipulation}
.date-ctrl{display:none}
.date-ctrl.show{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:6px}

/* PANEL */
.panel{display:none}.panel.active{display:block}

@media(max-width:600px){
  .kpi3{grid-template-columns:1fr 1fr}
  .kpi:last-child{grid-column:span 2}
  .kv{font-size:18px}
  .topbar h1{font-size:14px}
  .topbar .sub{display:none}
}
@media(max-width:400px){
  .kpi3{grid-template-columns:1fr}
  .kpi:last-child{grid-column:span 1}
}
</style>
</head>
<body>

<div class="topbar">
  <div><h1>Producao Escavadeiras &mdash; Tripoloni</h1><div class="sub">Resumo executivo</div></div>
  <div class="date-badge" id="badge-date"></div>
</div>

<div class="obra-strip" id="obra-strip"></div>

<div class="main">
  <!-- VISAO TODAS -->
  <div id="panel-all" class="panel active">
    <div class="sec-title" id="title-all"></div>
    <div class="kpi3" id="kpis-all"></div>
    <div class="card">
      <div class="ct"><span class="dot" style="background:var(--blue)"></span><span id="ct-all-1">Desempenho do dia por obra</span></div>
      <div class="tw"><table id="tbl-all"></table></div>
    </div>
    <div class="card" id="card-all-2" style="display:none">
      <div class="ct"><span class="dot" style="background:var(--teal)"></span><span id="ct-all-2"></span></div>
      <div class="tw"><table id="tbl-all-2"></table></div>
    </div>
  </div>

  <!-- VISAO OBRA -->
  <div id="panel-obra" class="panel">
    <div class="sec-title" id="title-obra"></div>
    <div class="kpi3" id="kpis-obra"></div>
    <div class="card">
      <div class="ct"><span class="dot" style="background:var(--blue)"></span><span id="ct-lastday">Desempenho por equipamento</span></div>
      <div class="tw"><table id="tbl-lastday"></table></div>
    </div>
    <div class="card" id="card-obra-sun" style="display:none">
      <div class="ct"><span class="dot" style="background:var(--teal)"></span><span id="ct-obra-sun"></span></div>
      <div class="tw"><table id="tbl-obra-sun"></table></div>
    </div>
    <div class="card">
      <div class="ct"><span class="dot" style="background:var(--teal)"></span>Acumulado por equipamento</div>
      <div class="ctrl">
        <label>Periodo:</label>
        <div class="seg">
          <button class="active" onclick="setPeriod('total',this)">Acumulado total</button>
          <button onclick="setPeriod('week',this)">Semana atual</button>
          <button onclick="setPeriod('month',this)">Mes atual</button>
          <button onclick="setPeriod('custom',this)">Personalizado</button>
        </div>
      </div>
      <div class="date-ctrl" id="date-ctrl">
        <label>De:</label>
        <input type="date" id="dt-start" onchange="applyCustom()">
        <label>Ate:</label>
        <input type="date" id="dt-end" onchange="applyCustom()">
      </div>
      <div class="tw"><table id="tbl-accum"></table></div>
    </div>
  </div>
</div>

function fmt(n){var v=Math.round(n||0);return v.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function fmtH(n){return ((n||0)).toFixed(1);}
function fmtM(n){return n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':Math.round(n||0).toString();}
function bc(u){return u>=35?'b-ok':u>=20?'b-warn':'b-danger';}
function th(t,cls){return '<th'+(cls?' class="'+cls+'"':'')+'>'+t+'</th>';}
function hd(s){return '<thead><tr>'+s+'</tr></thead><tbody>';}

// Max date across obras with apontamento
var MAX_DATE = '';
var WEEK_START = '';
var MONTH_START = '';
var MAX_FMT = '';
var OBRAS_ATIVAS = [];

function initRefs(){
  MAX_DATE   = D.ref_dates.max_date;
  WEEK_START = D.ref_dates.week_start;
  MONTH_START= D.ref_dates.month_start;
  MAX_FMT    = MAX_DATE.split('-').reverse().join('/');
  if(new Date().getDay() === 1) {
    // Monday: show all obras that produced in previous week (Mon-Sun)
    var prevMon = new Date();
    prevMon.setDate(prevMon.getDate() - 7);
    var prevMonStr = prevMon.getFullYear()+'-'+
      String(prevMon.getMonth()+1).padStart(2,'0')+'-'+
      String(prevMon.getDate()).padStart(2,'0');
    var prevSunStr = MAX_DATE; // MAX_DATE on Monday = Sunday
    // Actually MAX_DATE = last date with any data, could be Friday or Saturday
    // Use getPrevWeekendDates().sun as the end of previous week
    var wkndRef = getPrevWeekendDates();
    var weekEnd = wkndRef.sun;
    var weekStart = new Date(weekEnd+'T00:00:00');
    weekStart.setDate(weekStart.getDate() - 6); // Previous Monday
    var weekStartStr = weekStart.getFullYear()+'-'+
      String(weekStart.getMonth()+1).padStart(2,'0')+'-'+
      String(weekStart.getDate()).padStart(2,'0');
    OBRAS_ATIVAS = D.obras.filter(function(o){
      var daily = D.daily_obra[o] || {};
      return Object.keys(daily).some(function(d){
        return d >= weekStartStr && d <= weekEnd && (daily[d].prod||0) > 0;
      });
    });
  } else {
    OBRAS_ATIVAS = D.obras.filter(function(o){
      return (D.obra_ponderado[o]||{}).last_date === MAX_DATE;
    });
  }
}

function buildStrip(){
  var html='';
  // ALL card
  var totProd = D.obras.reduce(function(a,o){return a+((D.obra_ponderado[o]||{}).prod_total||0);},0);
  html+='<div class="ocard'+(selObra==='ALL'?' active':'')+'" onclick="selOb(this.dataset.obra)" data-obra="ALL">';
  html+='<div class="on">TODAS</div><div class="ov">'+fmtM(totProd)+'t</div></div>';
  // Only obras with data on max_date
  OBRAS_ATIVAS.forEach(function(o){
    var active=selObra===o?' active':'';
    html+='<div class="ocard'+active+'" onclick="selOb(this.dataset.obra)" data-obra="'+o+'">';
    html+='<div class="on">'+(OS[o]||o)+'</div>';
    var _wp = isMonday() ? (function(){
      var wkRef=getPrevWeekendDates();
      var wkMon=new Date(wkRef.sun+'T00:00:00'); wkMon.setDate(wkMon.getDate()-6);
      var wkMonStr=wkMon.getFullYear()+'-'+String(wkMon.getMonth()+1).padStart(2,'0')+'-'+String(wkMon.getDate()).padStart(2,'0');
      var daily=D.daily_obra[o]||{};
      return Object.keys(daily).reduce(function(a,d){return d>=wkMonStr&&d<=wkRef.sun?a+(daily[d].prod||0):a;},0);
    })() : ((D.obra_ponderado[o]||{}).prod_total||0);
    html+='<div class="ov">'+fmtM(_wp)+'t</div></div>';
  });
  document.getElementById('obra-strip').innerHTML=html;
}

function selOb(o){

}

// ── SEGUNDA-FEIRA: logica de sabado e domingo ─────────────────
function isMonday() {
  return new Date().getDay() === 1;
}

function getPrevWeekendDates() {
  // Returns {sat: 'YYYY-MM-DD', sun: 'YYYY-MM-DD'} for last weekend
  var today = new Date();
  var dayOfWeek = today.getDay(); // 0=sun, 1=mon
  var sat = new Date(today);
  var sun = new Date(today);
  if(dayOfWeek === 1) { // Monday
    sat.setDate(today.getDate() - 2); // Saturday
    sun.setDate(today.getDate() - 1); // Sunday
  }
  function fmt(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }
  return { sat: fmt(sat), sun: fmt(sun) };
}

function buildDayTableRows(targetDate, obras) {
  // Build table rows for a specific date, only obras with data
  var rows = [];
  obras.forEach(function(o) {
    var eqMap = D.daily_obra_eq[o] || {};
    var prod=0, hrs=0, oc=0, nEq=0;
    Object.keys(eqMap).forEach(function(es) {
      var d = (eqMap[es] || {})[targetDate];
      if(d) {
        prod += d.prod||0;
        hrs  += d.hrs||0;
        oc   += d.oc||0;
        if(d.prod > 0 || d.hrs > 0) nEq++;
      }
    });
    if(prod > 0 || hrs > 0) {
      var u = hrs/(hrs+oc)*100||0;
      var ph = hrs>0 ? prod/hrs : 0;
      var prodEq = nEq>0 ? Math.round(prod/nEq) : 0;
      rows.push({o:o, prod:prod, hrs:hrs, oc:oc, u:u, ph:ph, nEq:nEq, prodEq:prodEq});
    }
  });
  return rows.sort(function(a,b){return b.prod-a.prod;});
}

function buildDayTableHTML(rows, dateLabel) {
  if(rows.length === 0) {
    return '<p style="padding:10px;color:var(--muted);font-size:12px">Sem apontamentos em '+dateLabel+'</p>';
  }
  var totP=0, totH=0, totO=0, totEq=0;
  rows.forEach(function(r){totP+=r.prod;totH+=r.hrs;totO+=r.oc;totEq+=r.nEq;});
  var totU = totH/(totH+totO)*100||0;
  var totPH = totH>0 ? totP/totH : 0;
  var totProdEq = totEq>0 ? Math.round(totP/totEq) : 0;
  var h = hd(th('Obra')+th('Equip.','r')+th('Producao (t)','r')+th('Prod/Equip (t)','r')+th('Hrs Trab.','r')+th('Hrs Ociosas','r')+th('Prod/H (t/h)','r')+th('Utilizacao'));
  rows.forEach(function(r){
    h += '<tr><td class="obra-nm">'+(OS[r.o]||r.o)+'</td>';
    h += '<td class="r">'+r.nEq+'</td>';
    h += '<td class="r">'+fmt(r.prod)+'</td>';
    h += '<td class="r">'+fmt(r.prodEq)+'</td>';
    h += '<td class="r">'+fmtH(r.hrs)+' h</td>';
    h += '<td class="r">'+fmtH(r.oc)+' h</td>';
    h += '<td class="r ph-val">'+(r.ph>0?r.ph.toFixed(1):'--')+'</td>';
    h += '<td><span class="badge '+bc(r.u)+'">'+r.u.toFixed(1)+'%</span></td></tr>';
  });
  h += '<tr class="total-row"><td>TOTAL</td><td class="r">'+totEq+'</td><td class="r">'+fmt(totP)+'</td><td class="r">'+fmt(totProdEq)+'</td><td class="r">'+fmtH(totH)+' h</td><td class="r">'+fmtH(totO)+' h</td><td class="r ph-val">'+totPH.toFixed(1)+'</td><td><span class="badge '+bc(totU)+'">'+totU.toFixed(1)+'%</span></td></tr>';
  return h+'</tbody>';
}

  // KPIs totais
  var wProd=0,mProd=0,tProd=0,wED=0,mED=0,tED=0,dayProd=0,dayED=0;

  });

  // Week/month label
  var wStart = WEEK_START.split('-').reverse().join('/');
  var monthNames=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var mLbl = monthNames[parseInt(MONTH_START.split('-')[1])-1]+' '+MONTH_START.split('-')[0];

  document.getElementById('title-all').textContent='Acumulado de producao — '+MAX_FMT;
  document.getElementById('kpis-all').innerHTML=
    kpiCard('Producao do dia',fmt(dayProd)+'t',MAX_FMT,dayED>0?Math.round(dayProd/dayED):0)+
    kpiCard('Semana atual',fmtM(wProd)+'t',wStart+' — '+MAX_FMT,wED>0?Math.round(wProd/wED):0)+
    kpiCard('Mes atual',fmtM(mProd)+'t',mLbl,mED>0?Math.round(mProd/mED):0);

  // Table
  var rows=OBRAS_ATIVAS.map(function(o){
    var ld=D.last_day_data[o]||{};
    var eqs=Object.keys(ld);
    var prod=0,hrs=0,oc=0;
    eqs.forEach(function(es){prod+=ld[es].prod||0;hrs+=ld[es].hrs||0;oc+=ld[es].oc||0;});
    var u=hrs/(hrs+oc)*100||0;
    var ph=hrs>0?prod/hrs:0;
    var nEq=eqs.length;
    var prodEq=nEq>0?Math.round(prod/nEq):0;
    return {o:o,prod:prod,hrs:hrs,oc:oc,u:u,ph:ph,nEq:nEq,prodEq:prodEq};
  }).sort(function(a,b){return b.prod-a.prod;});

  var totP=0,totH=0,totO=0,totEq=0;
  rows.forEach(function(r){totP+=r.prod;totH+=r.hrs;totO+=r.oc;totEq+=r.nEq;});
  var totU=totH/(totH+totO)*100||0;
  var totPH=totH>0?totP/totH:0;
  var totProdEq=totEq>0?Math.round(totP/totEq):0;

  var h=hd(th('Obra')+th('Equip.','r')+th('Producao (t)','r')+th('Prod/Equip (t)','r')+th('Hrs Trab.','r')+th('Hrs Ociosas','r')+th('Prod/H (t/h)','r')+th('Utilizacao'));
  rows.forEach(function(r){
    h+='<tr><td class="obra-nm">'+(OS[r.o]||r.o)+'</td>';
    h+='<td class="r">'+r.nEq+'</td>';
    h+='<td class="r">'+fmt(r.prod)+'</td>';
    h+='<td class="r">'+fmt(r.prodEq)+'</td>';
    h+='<td class="r">'+fmtH(r.hrs)+' h</td>';
    h+='<td class="r">'+fmtH(r.oc)+' h</td>';
    h+='<td class="r ph-val">'+(r.ph>0?r.ph.toFixed(1):'--')+'</td>';
    h+='<td><span class="badge '+bc(r.u)+'">'+r.u.toFixed(1)+'%</span></td></tr>';
  });
  h+='<tr class="total-row"><td>TOTAL</td><td class="r">'+totEq+'</td><td class="r">'+fmt(totP)+'</td><td class="r">'+fmt(totProdEq)+'</td><td class="r">'+fmtH(totH)+' h</td><td class="r">'+fmtH(totO)+' h</td><td class="r ph-val">'+totPH.toFixed(1)+'</td><td><span class="badge '+bc(totU)+'">'+totU.toFixed(1)+'%</span></td></tr>';

  if(isMonday()) {
    // Monday: show Sabado + Domingo tables with ALL obras that produced in prev week
    var wknd = getPrevWeekendDates();
    var satFmt = wknd.sat.split('-').reverse().join('/');
    var sunFmt = wknd.sun.split('-').reverse().join('/');

    // Get start of previous week (last Monday)
    var prevMonday = new Date();
    prevMonday.setDate(prevMonday.getDate() - 7);
    var prevMondayStr = prevMonday.getFullYear()+'-'+
      String(prevMonday.getMonth()+1).padStart(2,'0')+'-'+
      String(prevMonday.getDate()).padStart(2,'0');

    // Find all obras that had production in prev week (Mon-Sun)
    var obrasWithPrevWeek = D.obras.filter(function(o) {
      var daily = D.daily_obra[o] || {};
      return Object.keys(daily).some(function(d) {
        return d >= prevMondayStr && d <= wknd.sun && (daily[d].prod||0) > 0;
      });
    });

    document.getElementById('ct-all-1').textContent = 'Sabado — '+satFmt;
    var satRows = buildDayTableRows(wknd.sat, obrasWithPrevWeek);
    // For obras with no sat production, show them with zeros if they produced in the week
    var obrasNoSat = obrasWithPrevWeek.filter(function(o){
      return !satRows.find(function(r){return r.o===o;});
    });
    obrasNoSat.forEach(function(o){ satRows.push({o:o,prod:0,hrs:0,oc:0,u:0,ph:0,nEq:0,prodEq:0}); });
    document.getElementById('tbl-all').innerHTML = buildDayTableHTML(satRows.filter(function(r){return r.prod>0;}), satFmt);

    var card2 = document.getElementById('card-all-2');
    var sunRows = buildDayTableRows(wknd.sun, obrasWithPrevWeek);
    document.getElementById('ct-all-2').textContent = 'Domingo — '+sunFmt;
    document.getElementById('tbl-all-2').innerHTML = buildDayTableHTML(sunRows, sunFmt);
    card2.style.display = 'block';
  } else {
    document.getElementById('ct-all-1').textContent = 'Desempenho do dia por obra — '+MAX_FMT;
    document.getElementById('tbl-all').innerHTML=h+'</tbody>';
    document.getElementById('card-all-2').style.display='none';
  }
}

function kpiCard(lbl,val,sub,ped){
  return '<div class="kpi">' +
    '<span class="kl">'+lbl+'</span>' +
    '<span class="kv">'+val+'</span>' +
    '<span class="ks">'+sub+'</span>' +
    '<span class="kpi-div"></span>' +
    '<span class="kped-val">'+fmt(ped)+'</span>' +
    '<span class="kped-lbl">t/eq-dia</span>' +
    '</div>';
}

// ── VISAO OBRA ───────────────────────────────────────────────
function renderObra(){
  document.getElementById('panel-all').classList.remove('active');
  document.getElementById('panel-obra').classList.add('active');

  var o=selObra;
  var s=D.obra_summary_exec[o]||{};
  var monthNames=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var mLbl=monthNames[parseInt(MONTH_START.split('-')[1])-1]+' '+MONTH_START.split('-')[0];
  var wStart=WEEK_START.split('-').reverse().join('/');

  document.getElementById('title-obra').textContent=(OS[o]||o)+' — acumulado de producao';
  document.getElementById('ct-lastday').textContent='Desempenho por equipamento — '+MAX_FMT;

  // Producao do dia para a obra
  var oLd=D.last_day_data[o]||{};
  var oDayProd=0,oDayED=0;
  Object.keys(oLd).forEach(function(es){oDayProd+=oLd[es].prod||0;oDayED++;});
  var oDayPedEq=oDayED>0?Math.round(oDayProd/oDayED):0;

  document.getElementById('kpis-obra').innerHTML=
    kpiCard('Producao do dia',fmt(oDayProd)+'t',MAX_FMT,oDayPedEq)+
    kpiCard('Semana atual',fmtM(s.week_prod||0)+'t',wStart+' — '+MAX_FMT,s.week_prod_eq_dia||0)+
    kpiCard('Mes atual',fmtM(s.month_prod||0)+'t',mLbl,s.month_prod_eq_dia||0);

  // Last day table
  var ld=D.last_day_data[o]||{};
  var eqs=Object.keys(ld).sort();
  var h=hd(th('Equipamento')+th('Producao (t)','r')+th('Hrs Trab.','r')+th('Hrs Ociosas','r')+th('Motor Par.','r')+th('Distancia','r')+th('Prod/H (t/h)','r')+th('Utilizacao'));
  var totP=0,totH=0,totO=0;
  eqs.forEach(function(es){
    var d=ld[es]||{};
    var u=(d.hrs||0)/((d.hrs||0)+(d.oc||0))*100||0;
    var ph=d.hrs>0?d.prod/d.hrs:0;
    totP+=d.prod||0;totH+=d.hrs||0;totO+=d.oc||0;
    h+='<tr><td><span class="es-tag">'+es+'</span></td>';
    h+='<td class="r">'+fmt(d.prod)+'</td>';
    h+='<td class="r">'+fmtH(d.hrs)+' h</td>';
    h+='<td class="r">'+fmtH(d.oc)+' h</td>';
    h+='<td class="r">'+fmtH(d.motor)+' h</td>';
    h+='<td class="r">'+(d.dist?fmtH(d.dist)+' km':'--')+'</td>';
    h+='<td class="r ph-val">'+(ph>0?ph.toFixed(1):'--')+'</td>';
    h+='<td><span class="badge '+bc(u)+'">'+u.toFixed(1)+'%</span></td></tr>';
  });
  var tu=totH/(totH+totO)*100||0;
  var tph=totH>0?totP/totH:0;
  h+='<tr class="total-row"><td>TOTAL DO DIA</td><td class="r">'+fmt(totP)+'</td><td class="r">'+fmtH(totH)+' h</td><td class="r">'+fmtH(totO)+' h</td><td class="r">--</td><td class="r">--</td><td class="r ph-val">'+tph.toFixed(1)+'</td><td><span class="badge '+bc(tu)+'">'+tu.toFixed(1)+'%</span></td></tr>';
  if(isMonday()) {
    var wkndOb = getPrevWeekendDates();
    var satFmtOb = wkndOb.sat.split('-').reverse().join('/');
    var sunFmtOb = wkndOb.sun.split('-').reverse().join('/');
    // Saturday table for this obra
    document.getElementById('ct-lastday').textContent = 'Sabado — '+satFmtOb;
    var satEqRows = getEqRowsForDate(o, wkndOb.sat);
    document.getElementById('tbl-lastday').innerHTML = buildEqTableHTML(satEqRows, satFmtOb);
    // Sunday table for this obra
    var cardObSun = document.getElementById('card-obra-sun');
    if(cardObSun) {
      var sunEqRows = getEqRowsForDate(o, wkndOb.sun);
      document.getElementById('ct-obra-sun').textContent = 'Domingo — '+sunFmtOb;
      document.getElementById('tbl-obra-sun').innerHTML = buildEqTableHTML(sunEqRows, sunFmtOb);
      cardObSun.style.display = 'block';
    }
  } else {
    document.getElementById('ct-lastday').textContent = 'Desempenho por equipamento — '+MAX_FMT;
    document.getElementById('tbl-lastday').innerHTML=h+'</tbody>';
    var cardObSun2 = document.getElementById('card-obra-sun');
    if(cardObSun2) cardObSun2.style.display = 'none';
  }

  renderAccum();
}

function setPeriod(p,btn){
  selPeriod=p;
  btn.parentElement.querySelectorAll('button').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var dc=document.getElementById('date-ctrl');
  if(p==='custom') dc.classList.add('show'); else dc.classList.remove('show');
  renderAccum();
}

function applyCustom(){
  dtStart=document.getElementById('dt-start').value;
  dtEnd=document.getElementById('dt-end').value;
  if(dtStart&&dtEnd) renderAccum();
}

function renderAccum(){
  var o=selObra;
  if(o==='ALL') return;
  var eqMap=D.daily_obra_eq[o]||{};
  var allEqs=Object.keys(eqMap).sort();

  // Determine date filter
  function inRange(d){
    if(selPeriod==='week') return d>=WEEK_START;
    if(selPeriod==='month') return d.startsWith(MONTH_START);
    if(selPeriod==='custom'&&dtStart&&dtEnd) return d>=dtStart&&d<=dtEnd;
    return true; // total
  }

  var h=hd(th('Equipamento')+th('Producao (t)','r')+th('Hrs Trab.','r')+th('Hrs Ociosas','r')+th('Dias Apont.','r')+th('Media t/Dia','r')+th('Prod/H (t/h)','r')+th('Utilizacao'));
  var totP=0,totH=0,totO=0;
  allEqs.forEach(function(es){
    var days=eqMap[es]||{};
    var p=0,hrs=0,oc=0,dias=0;
    Object.keys(days).forEach(function(d){
      if(!inRange(d)) return;
      p+=days[d].prod||0; hrs+=days[d].hrs||0; oc+=days[d].oc||0;
      if(days[d].prod>0) dias++;
    });
    if(p===0&&hrs===0) return;
    var u=hrs/(hrs+oc)*100||0;
    var ph=hrs>0?p/hrs:0;
    var media=dias>0?Math.round(p/dias):0;
    totP+=p;totH+=hrs;totO+=oc;
    h+='<tr><td><span class="es-tag">'+es+'</span></td>';
    h+='<td class="r">'+fmt(p)+'</td>';
    h+='<td class="r">'+fmtH(hrs)+' h</td>';
    h+='<td class="r">'+fmtH(oc)+' h</td>';
    h+='<td class="r">'+dias+'</td>';
    h+='<td class="r">'+fmt(media)+'</td>';
    h+='<td class="r ph-val">'+(ph>0?ph.toFixed(1):'--')+'</td>';
    h+='<td><span class="badge '+bc(u)+'">'+u.toFixed(1)+'%</span></td></tr>';
  });
  var tu=totH/(totH+totO)*100||0;
  var tph=totH>0?totP/totH:0;

  // Period label for total row
  var periodLabel='Acumulado total';
  if(selPeriod==='week') periodLabel='Semana atual';
  else if(selPeriod==='month') periodLabel='Mes atual';
  else if(selPeriod==='custom'&&dtStart&&dtEnd) periodLabel=dtStart.split('-').reverse().join('/')+' a '+dtEnd.split('-').reverse().join('/');

  h+='<tr class="total-row"><td>'+periodLabel+'</td><td class="r">'+fmt(totP)+'</td><td class="r">'+fmtH(totH)+' h</td><td class="r">'+fmtH(totO)+' h</td><td class="r">--</td><td class="r">--</td><td class="r ph-val">'+tph.toFixed(1)+'</td><td><span class="badge '+bc(tu)+'">'+tu.toFixed(1)+'%</span></td></tr>';
  document.getElementById('tbl-accum').innerHTML=h+'</tbody>';
}

// INIT
try {
  initRefs();
  var _m=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  var _n=new Date();
  document.getElementById('badge-date').textContent=String(_n.getDate()).padStart(2,'0')+' '+_m[_n.getMonth()]+'. '+_n.getFullYear();
  buildStrip();
  renderAll();
} catch(e){
  console.error('Dashboard executivo init error:', e);
  document.body.innerHTML += '<div style="padding:20px;color:red;font-family:monospace;background:#fff;margin:10px;border-radius:8px;border:1px solid red"><strong>Erro ao inicializar:</strong><br>' + e.message + '<br><small>' + (e.stack||'') + '</small></div>';
}
function getEqRowsForDate(obra, targetDate) {
  var eqMap = D.daily_obra_eq[obra] || {};
  var rows = [];
  Object.keys(eqMap).sort().forEach(function(es) {
    var d = (eqMap[es]||{})[targetDate];
    if(d && (d.prod>0||d.hrs>0)) rows.push({es:es,prod:d.prod||0,hrs:d.hrs||0,oc:d.oc||0});
  });
  return rows;
}

function buildEqTableHTML(rows, dateLabel) {
  if(!rows||rows.length===0) return '<p style="padding:10px;color:var(--muted);font-size:12px">Sem apontamentos em '+dateLabel+'</p>';
  var totP=0,totH=0,totO=0;
  rows.forEach(function(r){totP+=r.prod;totH+=r.hrs;totO+=r.oc;});
  var totU=totH/(totH+totO)*100||0; var totPH=totH>0?totP/totH:0;
  var h='<thead><tr>'+th('Equipamento')+th('Producao (t)','r')+th('Hrs Trab.','r')+th('Hrs Ociosas','r')+th('Prod/H (t/h)','r')+th('Utilizacao')+'</tr></thead><tbody>';
  rows.forEach(function(r){
    var u=(r.hrs||0)/((r.hrs||0)+(r.oc||0))*100||0;
    var ph=r.hrs>0?r.prod/r.hrs:0;
    h+='<tr><td><span class="es-tag">'+r.es+'</span></td>';
    h+='<td class="r" style="font-weight:600">'+fmt(r.prod)+'</td>';
    h+='<td class="r">'+fmtH(r.hrs)+' h</td><td class="r">'+fmtH(r.oc)+' h</td>';
    h+='<td class="r" style="font-weight:600;color:var(--teal)">'+(ph>0?ph.toFixed(1):'--')+'</td>';
    h+='<td><span class="badge '+bc(u)+'">'+u.toFixed(1)+'%</span></td></tr>';
  });
  h+='<tr class="total-row"><td>TOTAL</td><td class="r">'+fmt(totP)+'</td><td class="r">'+fmtH(totH)+' h</td><td class="r">'+fmtH(totO)+' h</td><td class="r" style="font-weight:700;color:var(--teal)">'+totPH.toFixed(1)+'</td><td><span class="badge '+bc(totU)+'">'+totU.toFixed(1)+'%</span></td></tr>';
  return h+'</tbody>';
}

</script>
